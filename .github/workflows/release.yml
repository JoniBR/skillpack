name: Release to npm

on:
  push:
    tags: ['v*.*.*']
  workflow_dispatch:

# Trusted-publishing OIDC: GitHub mints a short-lived token at job runtime
# and npm trusts it because the @skill-pack/* packages list this workflow
# as a trusted publisher. No NPM_TOKEN secret anywhere.
#
# Setup on npmjs.com (once per package, OR once at the org level after
# the initial bootstrap publish):
#   Settings → Publishing access → Trusted publishers → Add
#     Provider: GitHub Actions
#     Org/user: JoniBR
#     Repo:    skillpack
#     Workflow: release.yml
#     Environment: npm-publish    (matches `environment:` below)
permissions:
  contents: read
  id-token: write # required for OIDC token minting

jobs:
  publish:
    runs-on: ubuntu-latest
    environment: npm-publish
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9.12.0

      - uses: actions/setup-node@v4
        with:
          node-version: 22 # Node 22 ships npm 10.x; we upgrade to 11.5+ below for OIDC
          cache: pnpm
          # `registry-url` writes ~/.npmrc with the registry + AUTH placeholder
          # so npm publish picks up the OIDC token automatically.
          registry-url: https://registry.npmjs.org

      - name: Install npm 11.5+ via corepack (required for OIDC trusted publishing)
        # `npm install -g npm@latest` is currently broken on ubuntu-24.04's
        # Node 22 baseline (transitive dep `promise-retry` doesn't link). corepack
        # is the npm-team-recommended way to pin a specific npm version.
        run: |
          corepack enable
          corepack prepare npm@11.5.1 --activate
          npm --version

      - run: pnpm install --frozen-lockfile
      - run: pnpm -r typecheck
      - run: pnpm -r test

      # Ensures dist/ + staged bundles are fresh for the prepublishOnly hook.
      - run: pnpm --filter @skill-pack/cli build
      - run: pnpm --filter @skill-pack/pi build

      - name: Publish via changesets (uses OIDC; no NPM_TOKEN)
        run: pnpm release
