name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9.12.0
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm -r typecheck
      - run: pnpm -r test
      - run: pnpm -r build

  smoke-scaffold:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9.12.0
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm --filter @skill-pack/cli build
      - name: Scaffold react + remotion into /tmp
        run: |
          mkdir -p /tmp/skillpack-smoke
          cd /tmp/skillpack-smoke
          node $GITHUB_WORKSPACE/packages/cli/dist/bin/skillpack.js \
            scaffold react remotion --no-install --host both
          test -f AGENTS.md
          test -f .claude/skills/react/SKILL.md
          test -f .claude/skills/react-remotion/SKILL.md
          test -f .pi/skills/react/SKILL.md
          test -f .pi/skills/react-remotion/SKILL.md
          test -f .skillpack/state/remotion.json
          test -f src/video/MyVideo.tsx
          grep -q "@skillpack:manifest" AGENTS.md
          grep -q "VideoPreview" src/App.tsx
          echo "✔ smoke test passed"
